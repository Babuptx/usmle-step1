<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMLE Step 1 - Master Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <h1>USMLE Step 1 <span>Master Bank</span></h1>
        
        <div class="sets-container">
            <div class="set-row">
                <span class="set-label">Set 1: Foundations</span>
                <div class="level-buttons">
                    <button class="lvl-btn active" data-file="block1.json">L-1</button>
                    <button class="lvl-btn" data-file="block2.json">L-2</button>
                    <button class="lvl-btn" data-file="block3.json">L-3</button>
                    <button class="lvl-btn" data-file="block4.json">L-4</button>
                    <button class="lvl-btn" data-file="block5.json">L-5</button>
                    <button class="lvl-btn" data-file="block6.json">L-6</button>
                    <button class="lvl-btn" data-file="block7.json">L-7</button>
                </div>
            </div>

            <div class="set-row">
                <span class="set-label">Set 2: Clinical</span>
                <div class="level-buttons">
                    <button class="lvl-btn" data-file="block8.json">L-8</button>
                    <button class="lvl-btn" data-file="block9.json">L-9</button>
                    <button class="lvl-btn" data-file="block10.json">L-10</button>
                    <button class="lvl-btn" data-file="block11.json">L-11</button>
                    <button class="lvl-btn" data-file="block12.json">L-12</button>
                    <button class="lvl-btn" data-file="block13.json">L-13</button>
                    <button class="lvl-btn" data-file="block14.json">L-14</button>
                </div>
            </div>
        </div>
    </header>

    <main class="quiz-container">
        <div class="stats-bar">
            <div class="stat-box">Block: <span id="block-title-display">Loading...</span></div>
            <div class="stat-box">Question: <span id="question-counter">0 / 0</span></div>
            <div class="stat-box">Score: <span id="score-display">0%</span></div>
        </div>

        <div id="question-box" class="question-box">
            <div class="tags">
                <span id="discipline-tag" class="tag">Discipline</span>
                <span id="system-tag" class="tag">System</span>
            </div>
            <p id="vignette-text" class="vignette"></p>
            <div id="options-container" class="options">
                </div>
        </div>

        <div id="feedback-box" class="feedback-box hidden">
            <h3 id="feedback-title"></h3>
            <p id="educational-objective" class="objective"></p>
            <p id="correct-rationale" class="rationale-correct"></p>
            <div id="incorrect-rationales" class="rationale-incorrect"></div>
            <button id="next-btn" class="next-btn">Next Question ➔</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
